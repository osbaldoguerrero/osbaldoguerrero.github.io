<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>

html, body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

#soundBtn{
  width:20px;
  cursor:pointer;
  transition:transform 0.1s;
}

#soundBtn:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<img
  id="soundBtn"
  src="https://res.cloudinary.com/dkyjcwocf/image/upload/q_auto/f_auto/v1780356925/INSIGNIAS_4_gdnwbc.png"
/>

<audio id="audio">
  <source src="https://res.cloudinary.com/dkyjcwocf/video/upload/q_auto/f_auto/v1779328677/Morunas_-_Morning_Lights_Official_Video_kyr7av.mp3" type="audio/mpeg">
</audio>

<script>

const btn = document.getElementById("soundBtn");
const audio = document.getElementById("audio");

btn.addEventListener("click", () => {
  audio.currentTime = 0;
  audio.play();
});

</script>

</body>
</html>
