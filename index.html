<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>

html, body{
  margin:0;
  padding:0;
  background:transparent;
}

body{
  display:inline-block;
}

#soundBtn{
  width:30px;
  display:block;
  cursor:pointer;
  transition:transform 0.1s;
}

#soundBtn:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<img
  id="soundBtn"
  src="https://res.cloudinary.com/dkyjcwocf/image/upload/q_auto/f_auto/v1781047142/725384_1_elfulc.png"
/>

<audio id="audio">
  <source src="https://res.cloudinary.com/dkyjcwocf/video/upload/q_auto/f_auto/v1779328677/Morunas_-_Morning_Lights_Official_Video_kyr7av.mp3" type="audio/mpeg">
</audio>

<script>

const btn = document.getElementById("soundBtn");
const audio = document.getElementById("audio");

const playImage = "https://res.cloudinary.com/dkyjcwocf/image/upload/q_auto/f_auto/v1781047142/725384_1_elfulc.png";
const pauseImage = "https://res.cloudinary.com/dkyjcwocf/image/upload/q_auto/f_auto/v1781047149/725384_pzu8h5.png";

btn.addEventListener("click", () => {

  if(audio.paused){

    audio.play();
    btn.src = pauseImage;

  } else {

    audio.pause();
    btn.src = playImage;

  }

});

audio.addEventListener("ended", () => {
  btn.src = playImage;
});

</script>

</body>
</html>
